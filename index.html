<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <title>Interactive page</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Simple, traffic-based pricing</h1>
        <p>
          Sign-up for our 30-day trial.<span></span> No credit card required.
        </p>
      </header>

      <main class="main">
        <div class="page-viewers-container">
          <p class="main-page-viewers">
            <span class="page-viewers">100K</span> PAGEVIEWS
          </p>
          <input
            type="range"
            id="price"
            name="price"
            min="1"
            max="5"
            step="1"
            value="3"
          />
          <p class="main-page-price">
            <span class="page-price">$16.00</span> / month
          </p>
        </div>
        <div class="page-billing">
          <p>Monthly Billing</p>
          <div class="billing-radio-container">
            <div class="slider"></div>
            <label class="billing-label" for="billing"
              ><input type="checkbox" name="billing" id="billing"
            /></label>
          </div>
          <p>Yearly Billing</p>
          <p class="discount">-25%<span> discount</span></p>
        </div>
        <hr />
        <footer class="footer">
          <ul class="footer-list">
            <li class="list-item">
              <img src="images/icon-check.svg" alt="check icon" /> Unlimited
              websites
            </li>
            <li class="list-item">
              <img src="images/icon-check.svg" alt="check icon" /> 100% data
              ownership
            </li>
            <li class="list-item">
              <img src="images/icon-check.svg" alt="check icon" /> Email reports
            </li>
          </ul>
          <button type="button">Start my trial</button>
        </footer>
      </main>
    </div>
  </body>
</html>
